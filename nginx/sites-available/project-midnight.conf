# Rate limiting zone (add this to /etc/nginx/nginx.conf http block)
# limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

# ─── HTTP → HTTPS Redirect ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name project-midnight.dev www.project-midnight.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Main HTTPS Server ───────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name project-midnight.dev www.project-midnight.dev;

    # SSL — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/project-midnight.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/project-midnight.dev/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options   "nosniff"                      always;
    add_header X-XSS-Protection         "1; mode=block"                always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2;
    gzip_min_length 1024;

    # ── Next.js static assets (aggressive cache) ──────────────────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }

    location /icons/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # ── FastAPI backend — must come BEFORE the catch-all ─────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;

        # Rate limit API
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
    }

    # ── Next.js frontend — catch-all ──────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade     $http_upgrade;
        proxy_set_header   Connection  "upgrade";
        proxy_set_header   Host        $host;
        proxy_set_header   X-Real-IP   $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Logs
    access_log /var/log/nginx/project-midnight-access.log;
    error_log  /var/log/nginx/project-midnight-error.log warn;
}
